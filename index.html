<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buxoro Shahridan Xonadonlar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="preload" as="image" href="./images/building-5.webp">
  <link rel="preload" as="image" href="./images/owner-suit-transparent.png">
</head>
<body>
  <div class="wrapper">

    <!-- Top Header Banner -->
    <div class="top-header-banner">
      <div class="header-item">
        <span class="header-label">Taqdimot sanasi</span>
        <span class="header-value">28-IYUN</span>
      </div>
      <div class="header-logo">
        <img src="./images/logo.avif" alt="Mega House">
      </div>
      <div class="header-item header-item--right">
        <span class="header-label">Vaqti:</span>
        <span class="header-value">20:30</span>
      </div>
    </div>

    <!-- Eyebrow -->
    <p class="eyebrow">Onlayn Taqdimot</p>

    <!-- Main Title -->
    <h1 class="main-title">
      G'IJDUVON SHAHRIDA XONADONLAR ENDI
      <span class="highlight">BOSHLANG'ICH TO'LOVSIZ</span>
    </h1>

    <!-- About pill -->
    <div class="about-pill">LOYIHA HAQIDA</div>

    <!-- Content: features + person -->
    <div class="content-row">
      <ul class="features-list">
        <li class="feature">
          <span class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          </span>
          <span class="feature-body">Loyiha ichida <strong>kutubxona</strong> va <strong>fitnes zal</strong></span>
        </li>
        <li class="feature">
          <span class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </span>
          <span class="feature-body"><strong>250 kishilik</strong> banketniy zal</span>
        </li>
        <li class="feature">
          <span class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
          </span>
          <span class="feature-body">Farzandlaringiz uchun <strong>3 ta yozgi va qishki</strong> o'yingoh</span>
        </li>
      </ul>

      <div class="person">
        <img src="./images/building-5.webp" alt="Building" class="building-img" fetchpriority="high">
        <img src="./images/owner-suit-transparent.png" alt="Mega House" class="person-img" fetchpriority="high">
      </div>
    </div>

    <!-- Countdown -->
    <div class="countdown-row">
      <div class="timer" id="timer">01:31</div>
      <img src="./images/arrow.png" alt="" class="countdown-arrow">
    </div>

    <!-- CTA Button -->
    <a href="https://t.me/+xTeR1frPmzcyN2Ey" class="btn-primary">
      BEPUL QATNASHISH
    </a>

  </div>

  <script src="main.js"></script>
</body>
</html>
