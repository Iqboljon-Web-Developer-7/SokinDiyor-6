<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buxoro Shahridan Xonadonlar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">

    <!-- Top Header Banner -->
    <div class="top-header-banner">
      <div class="header-item">
        <span class="header-label">Taqdimot sanasi</span>
        <span class="header-value">22-MAY</span>
      </div>
      <div class="header-logo">
        <img src="./images/logo.png" alt="Mega House">
      </div>
      <div class="header-item header-item--right">
        <span class="header-label">Vaqti:</span>
        <span class="header-value">20:00</span>
      </div>
    </div>

    <!-- Eyebrow -->
    <p class="eyebrow">Onlayn Taqdimot</p>

    <!-- Main Title -->
    <h1 class="main-title">
      G'IJDUVON SHAHRIDA
      <span class="highlight">SOKIN DIYOR QURILISH</span>
      KOMPANIYASIDAN HONADONLAR
    </h1>

    <!-- About pill -->
    <div class="about-pill">LOYIHA HAQIDA</div>

    <!-- Content: features + person -->
    <div class="content-row">
      <ul class="features-list">
        <li class="feature">
          Loyiha ichida <strong>kutubxona</strong> va <strong>fitnes zal</strong>
        </li>
        <li class="feature">
          <strong>250 kishilik</strong> banketniy zal
        </li>
        <li class="feature">
          Farzandlaringiz uchun <strong>3 ta yozgi va qishki</strong> o'yingoh
        </li>
      </ul>

      <div class="person">
        <img src="./images/building-5.webp" alt="Building" class="building-img">
        <img src="./images/owner-transparent-2.png" alt="Mega House" class="person-img">
      </div>
    </div>

    <!-- Countdown -->
    <div class="countdown-row">
      <div class="timer" id="timer">01:31</div>
      <img src="./images/arrow.png" alt="" class="countdown-arrow">
    </div>

    <!-- CTA Button -->
    <a href="https://t.me/+xTeR1frPmzcyN2Ey" class="btn-primary">
      BEPUL QATNASHISH
    </a>

  </div>

  <script src="main.js"></script>
</body>
</html>
